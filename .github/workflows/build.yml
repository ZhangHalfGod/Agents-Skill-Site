name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Code/code

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Code/code/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync standards
        run: npm run sync
        continue-on-error: true
        # sync 在没有 standards/ 外部仓库时可能跳过，不影响构建验证

      - name: Validate manifest
        run: npm run validate

      - name: Build site
        run: npm run build

      - name: Check dead links
        run: npm run check:links
        continue-on-error: true
