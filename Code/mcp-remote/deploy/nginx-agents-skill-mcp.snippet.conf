# Agents Skill Site — Nginx location snippet (remote MCP)
#
# Paste into the same `server { }` as `/agents-skill/` (recommended: right after it).
# Edit /etc/nginx/sites-available/<your-site>, then:
#   nginx -t && nginx -s reload
#
# Upstream: Code/mcp-remote via PM2 → 127.0.0.1:3921 (localhost only)
# Public:
#   Health: http(s)://<PUBLIC_HOST>/agents-skill-mcp/healthz
#   MCP:    http(s)://<PUBLIC_HOST>/agents-skill-mcp/mcp  (Bearer token)
#
# Prefer `nginx -s reload` (or `service nginx reload`) after `nginx -t`.

    # --- agents-skill-mcp-remote (Streamable HTTP) ---
    location /agents-skill-mcp/ {
        proxy_pass http://127.0.0.1:3921/;
        proxy_http_version 1.1;

        # SDK localhost Host check: upstream sees Host=127.0.0.1
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward Bearer + MCP session headers
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Mcp-Session-Id $http_mcp_session_id;
        proxy_set_header Last-Event-ID $http_last_event_id;

        # Streamable HTTP / SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
