# 粘贴进现网 listen 80 的 server { } 内（与 /agents-skill/ 同文件）。
#
# 现网文件：
#   编辑：/etc/nginx/sites-available/mechassist
#   启用：/etc/nginx/sites-enabled/mechassist → 上述
#   勿改：default；勿动 3001–3003 相关 location
#
# 插入位置（推荐）：
#   紧挨现有 location /agents-skill/ { ... } 之后
#   （仍在 /auth 后、# Gaode Project 前亦可）
#
# 上游：Code/mcp-remote → 127.0.0.1:3921（仅本机）
# 对外：
#   探活 http://8.163.18.183/agents-skill-mcp/healthz
#   MCP  http://8.163.18.183/agents-skill-mcp/mcp
#
# 变更后：nginx -t && nginx -s reload
# （本机无 nginx.service，勿用 systemctl reload nginx）

    # --- agents-skill-mcp-remote（Streamable HTTP；勿改 3001–3003）---
    location /agents-skill-mcp/ {
        proxy_pass http://127.0.0.1:3921/;
        proxy_http_version 1.1;

        # SDK localhost Host 校验：上游看到 Host=127.0.0.1
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 透传 Bearer 与 MCP 会话头
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Mcp-Session-Id $http_mcp_session_id;
        proxy_set_header Last-Event-ID $http_last_event_id;

        # Streamable HTTP / SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
