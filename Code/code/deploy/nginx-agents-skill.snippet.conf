# 粘贴进现网 listen 80 的 server { } 内。
#
# 现网文件（2026-07-10 确认）：
#   编辑：/etc/nginx/sites-available/mechassist
#   启用：/etc/nginx/sites-enabled/mechassist → 上述
#   勿改：/etc/nginx/sites-available/default
#
# 插入位置（推荐）：
#   在 location /auth { ... } 结束之后、
#   「# Gaode Project」注释之前。
#
# 现网同 server 已有（勿动）：
#   root → /var/www/MechAssist-Fusion/extern-api/dist
#   / 、/api/voice/ 、/api 、/auth → MechAssist（3002）
#
# 形态 α（方案 B）：Nginx 直接 alias 到 VitePress 构建目录，
# **不再**使用 /var/www/agents-skill-site/dist 软链。
# 对外：http://8.163.18.183/agents-skill/
#
# 若现网仍是 alias …/agents-skill-site/dist/ ，请改成下面路径后：
#   nginx -t && nginx -s reload

    # --- agents-skill-site（形态 α / 方案 B；勿改 3001–3003）---
    location /agents-skill/ {
        alias /var/www/agents-skill-site/Code/code/docs/.vitepress/dist/;
        index index.html;
        try_files $uri $uri/ /agents-skill/index.html;
    }
