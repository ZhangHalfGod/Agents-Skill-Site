# Agents Skill Site — Nginx location snippet (static site)
#
# Paste into your existing `server { listen 80; ... }` (or HTTPS server block).
# Edit the site file under /etc/nginx/sites-available/<your-site>, then:
#   nginx -t && nginx -s reload
#
# Defaults for this project:
#   Public path : /agents-skill/
#   Clone root  : /var/www/agents-skill-site
#   Build output: .../Code/code/docs/.vitepress/dist/
#   Public URL  : http(s)://<PUBLIC_HOST>/agents-skill/
#
# Notes:
#   - Prefer Nginx `alias` (no PM2 required for the static site).
#   - Keep trailing slashes on both `location` and `alias`.
#   - Do not collide with other apps' ports/locations on the same host.

    # --- agents-skill-site (static VitePress) ---
    location /agents-skill/ {
        alias /var/www/agents-skill-site/Code/code/docs/.vitepress/dist/;
        index index.html;
        try_files $uri $uri/ /agents-skill/index.html;
    }
