# 粘贴进现网 listen 80 的 server { } 内（例如 mechassist），不要单独再开一个抢 80 的 server。
# 形态 α：静态 alias；不占用 3010；不碰 3001–3003。
# 部署根：/var/www/agents-skill-site/dist/
# 对外：http://8.163.18.183/agents-skill/

location /agents-skill/ {
    alias /var/www/agents-skill-site/dist/;
    index index.html;
    try_files $uri $uri/ /agents-skill/index.html;
}
